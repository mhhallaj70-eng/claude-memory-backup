name: Claude Memory Backup

on:
  schedule:
    - cron: '0 17 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run backup
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python backup.py

      - name: Commit memory
        run: |
          git config user.name "Memory Bot"
          git config user.email "bot@memory.local"
          git add memory.md
          git diff --staged --quiet || git commit -m "backup $(date +'%Y-%m-%d')"
          git push
